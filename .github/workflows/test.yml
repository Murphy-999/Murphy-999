name: Build and Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Go environment
        uses: actions/setup-go@v2
        with:
          go-version: '1.18'
      - name: Install dependencies
        run: go get -d -t ./...
      - name: Mock build
        run: echo 'Mock build successful'
    if: success()